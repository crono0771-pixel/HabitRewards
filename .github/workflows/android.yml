name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Find Gradle and Build APK
      run: |
        # البحث عن المجلد الذي يحتوي على ملف gradlew والدخول إليه
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file not found anywhere in the repository!"
          exit 1
        fi
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        echo "Found gradlew in directory: $GRADLE_DIR"
        cd "$GRADLE_DIR"
        
        # إعطاء صلاحيات التشغيل وبدء بناء الـ APK
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HabitRewards-APK
        path: |
          **/build/outputs/apk/debug/*.apk
