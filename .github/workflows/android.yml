name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # خطوة سحرية: تثبيت أداة Gradle على السيرفر مباشرة لأنها ناقصة في المستودع
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # إنشاء ملفات تشغيل الـ Gradle أوتوماتيكياً
    - name: Initialize Gradle Wrapper
      run: gradle wrapper

    # منح صلاحية التشغيل للملف الذي تم إنشاؤه للتو
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # بناء الـ APK مع إجبار السيرفر على تجاوز إعدادات التوقيع المذكورة في الـ README
    - name: Build APK (Debug)
      run: ./gradlew assembleDebug

    # رفع ملف الـ APK النهائي لك لتحميله
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StickHabit-APK
        path: |
          **/build/outputs/apk/debug/*.apk
